version: "3.9"

services:
  mysql:
    image: mysql:8
    container_name: mysql-plumora
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: plumora
      MYSQL_USER: plumora
      MYSQL_PASSWORD: StrongPassword!123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: